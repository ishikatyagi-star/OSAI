# Local run for the Hermes sidecar. From services/hermes-sidecar/:
#   OPENROUTER_API_KEY=sk-... HERMES_MODEL=anthropic/claude-sonnet-4 docker compose up --build
# Then point OSAI at it:  OSAI_HERMES_SIDECAR_URL=http://localhost:8088
services:
  hermes-sidecar:
    build: .
    ports:
      # Local/trusted-monolith spike only; never publish on all host interfaces.
      - "127.0.0.1:8088:8088"
    environment:
      # One of these, matching your chosen provider/model:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - HERMES_MODEL=${HERMES_MODEL:-}
      - HERMES_PROVIDER=${HERMES_PROVIDER:-}
      - HERMES_BASE_URL=${HERMES_BASE_URL:-}
      - HERMES_MAX_TOKENS=${HERMES_MAX_TOKENS:-}
      - HERMES_TOOLSETS=${HERMES_TOOLSETS:-search}
      # Always required. There is no unauthenticated development override.
      - SIDECAR_AUTH_TOKEN=${SIDECAR_AUTH_TOKEN:?Set SIDECAR_AUTH_TOKEN for /run auth}
    volumes:
      - hermes_data:/data/hermes

volumes:
  hermes_data:
