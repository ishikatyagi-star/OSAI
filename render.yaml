# Render Blueprint for the OSAI backend.
# The API, Postgres, and Key Value services use free plans. The Celery worker
# uses a paid Starter plan.
# Qdrant runs on Qdrant Cloud's free tier (create a free cluster at
# https://cloud.qdrant.io and paste its URL + API key below as secrets).
#
# Deploy: Render → New → Blueprint → pick this repo. After it provisions, set
# each service's `sync: false` secrets in the osai-api and osai-worker tabs.
#
# The Celery worker runs the beat schedule and execute queue used by recurring
# automations. Composio ingestion remains an API BackgroundTask; move that work
# to a real Celery task before describing ingest/extract as hosted offload.

# Postgres has been migrated to Supabase; OSAI_DATABASE_URL is now a
# dashboard-managed secret (see below), NOT wired fromDatabase. This block is
# kept only so a blueprint sync doesn't delete the old free Postgres. Delete it
# once Supabase is verified in prod and any pilot data is handled.
databases:
  - name: osai-postgres
    plan: free
    databaseName: osai
    user: osai

services:
  # Redis / Key Value store (free). Used by Celery if you later add a worker.
  - type: keyvalue
    name: osai-redis
    plan: free
    ipAllowList: []

  # FastAPI API (free web service, Docker).
  - type: web
    name: osai-api
    runtime: docker
    dockerfilePath: ./osai-backend/Dockerfile
    dockerContext: ./osai-backend
    healthCheckPath: /health/ready
    plan: free
    envVars:
      # Marks this as a non-local deployment. Activates the production guards:
      # the service refuses to boot without a strong OSAI_JWT_SECRET, and the
      # password-less email login is disabled (Google OAuth is the sign-in path).
      # To re-enable email login for a pilot, set OSAI_EMAIL_LOGIN_ENABLED=true.
      - key: OSAI_ENV
        value: production
      # Supabase connection string, set in the dashboard (secret): URL-encode the
      # password (@ -> %40, ! -> %21) and append ?sslmode=require. Must NOT be
      # wired fromDatabase, or a blueprint sync would clobber it with the expired
      # Render Postgres and crash-loop boot.
      - key: OSAI_DATABASE_URL
        sync: false
      - key: OSAI_REDIS_URL
        fromService:
          type: keyvalue
          name: osai-redis
          property: connectionString
      # Uvicorn proxy parsing is disabled in the image. Render guarantees that
      # duplicate XFF fields are combined in wire order and the first address is
      # the original client; the app selects that first valid address.
      - key: OSAI_RATE_LIMIT_FORWARDED_FOR_MODE
        value: render_first
      - key: OSAI_QDRANT_URL          # your Qdrant Cloud cluster URL (https://...)
        sync: false
      - key: OSAI_QDRANT_API_KEY      # your Qdrant Cloud API key
        sync: false
      - key: OSAI_GEMINI_API_KEY      # embeddings (fallback if no Jina/Voyage key)
        sync: false
      - key: OSAI_VOYAGE_API_KEY      # embeddings, no-billing alt; used if no Jina key
        sync: false
      - key: OSAI_JINA_API_KEY        # embeddings (jina-embeddings-v3); takes precedence over Voyage/Gemini
        sync: false
      - key: OSAI_EMBEDDING_DIMENSION # 1024 for Jina (jina-v3, max 1024) or Voyage; recreate Qdrant collection on switch
        sync: false
      - key: OSAI_LLM_API_KEY          # Groq (text generation)
        sync: false
      - key: OSAI_LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: OSAI_LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: OSAI_COMPOSIO_API_KEY
        sync: false
      - key: OSAI_COMPOSIO_AGENT_ENABLED  # Ask grounds via LLM tool-calling over connected Composio apps
        value: "false"                    # opt in only after connector ACL/tier-routing enforcement
      - key: OSAI_AUTOMATIONS_CRON_TOKEN  # must match the AUTOMATIONS_CRON_TOKEN GitHub secret
        sync: false
      # This topology deploys Celery beat, so the API cron hook must stay hidden.
      - key: OSAI_AUTOMATIONS_CRON_ENABLED
        value: "false"
      - key: OSAI_SENTRY_DSN           # error tracking; optional but strongly recommended
        sync: false
      - key: OSAI_SLACK_BOT_TOKEN
        sync: false
      - key: OSAI_SLACK_SIGNING_SECRET
        sync: false
      # Required before migration 0032 when SQL sources exist, and before adding
      # any new SQL source. Keep old keys after the primary during rotation.
      - key: OSAI_SQL_DSN_ENCRYPTION_KEYS
        sync: false
      - key: OSAI_ALLOWED_ORIGINS      # your Vercel frontend URL
        sync: false
      # Public URLs — non-secret, safe to commit. Update if domains change.
      - key: OSAI_PUBLIC_BASE_URL      # this API's public URL (Composio auto-ingest callback)
        value: https://osai-api-ema6.onrender.com
      - key: OSAI_FRONTEND_URL         # where to send users after OAuth sign-in
        value: https://trysheldon.vercel.app
      # Google sign-in (OAuth 2.0). Redirect URI is non-secret; the client
      # id/secret are set in the dashboard (never committed to git).
      - key: OSAI_GOOGLE_OAUTH_REDIRECT_URI
        value: https://osai-api-ema6.onrender.com/auth/google/callback
      - key: OSAI_GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: OSAI_GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      # Session JWT signing secret — set to a strong random value.
      - key: OSAI_JWT_SECRET
        sync: false

  # Celery worker for recurring automations. The heartbeat and scheduled run
  # tasks share the execute queue, proving beat -> queue -> worker end to end.
  # ponytail: -B is safe for one worker instance; split beat into its own
  # single-instance service before scaling this worker horizontally.
  - type: worker
    name: osai-worker
    runtime: docker
    dockerfilePath: ./osai-backend/Dockerfile
    dockerContext: ./osai-backend
    dockerCommand: uv run celery -A workers.celery_app worker -B -Q execute --loglevel=info
    plan: starter
    numInstances: 1
    envVars:
      - key: OSAI_ENV
        value: production
      - key: OSAI_DATABASE_URL
        sync: false
      - key: OSAI_REDIS_URL
        fromService:
          type: keyvalue
          name: osai-redis
          property: connectionString
      - key: OSAI_QDRANT_URL
        sync: false
      - key: OSAI_QDRANT_API_KEY
        sync: false
      - key: OSAI_GEMINI_API_KEY
        sync: false
      - key: OSAI_VOYAGE_API_KEY
        sync: false
      - key: OSAI_EMBEDDING_DIMENSION
        sync: false
      - key: OSAI_LLM_API_KEY
        sync: false
      - key: OSAI_LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: OSAI_LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: OSAI_COMPOSIO_API_KEY
        sync: false
      # The worker is the only recurring scheduler in this Render topology.
      - key: OSAI_AUTOMATIONS_CRON_ENABLED
        value: "false"
      - key: OSAI_AUTOMATIONS_BEAT_ENABLED
        value: "true"
      - key: OSAI_SLACK_BOT_TOKEN
        sync: false
      - key: OSAI_JWT_SECRET
        sync: false
