# Render Blueprint for the OSAI backend.
# Deploy: push to GitHub → Render → New → Blueprint → pick this repo.
# Fill the `sync: false` secrets in the Render dashboard after the first deploy.
# Frontend (osai-web) stays on Vercel; set OSAI_ALLOWED_ORIGINS to its URL.

databases:
  - name: osai-postgres
    plan: free
    databaseName: osai
    user: osai

services:
  # Redis / Key Value store for Celery.
  - type: keyvalue
    name: osai-redis
    plan: free
    ipAllowList: []

  # Qdrant vector store as a private service with a persistent disk.
  - type: pserv
    name: osai-qdrant
    runtime: image
    image:
      url: qdrant/qdrant:v1.14.1
    disk:
      name: qdrant-storage
      mountPath: /qdrant/storage
      sizeGB: 1

  # FastAPI API.
  - type: web
    name: osai-api
    runtime: docker
    dockerfilePath: ./osai-backend/Dockerfile
    dockerContext: ./osai-backend
    healthCheckPath: /health
    plan: starter
    envVars: &osai_env
      - key: OSAI_DATABASE_URL
        fromDatabase:
          name: osai-postgres
          property: connectionString
      - key: OSAI_REDIS_URL
        fromService:
          type: keyvalue
          name: osai-redis
          property: connectionString
      - key: OSAI_QDRANT_URL          # internal address of the qdrant private service
        value: http://osai-qdrant:6333
      - key: OSAI_GEMINI_API_KEY      # embeddings
        sync: false
      - key: OSAI_LLM_API_KEY          # Groq (text generation)
        sync: false
      - key: OSAI_LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: OSAI_LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: OSAI_COMPOSIO_API_KEY
        sync: false
      - key: OSAI_ALLOWED_ORIGINS      # your Vercel frontend URL
        sync: false

  # Celery worker (same image, different command).
  - type: worker
    name: osai-worker
    runtime: docker
    dockerfilePath: ./osai-backend/Dockerfile
    dockerContext: ./osai-backend
    dockerCommand: uv run celery -A workers.celery_app worker --loglevel=info
    plan: starter
    envVars: *osai_env
