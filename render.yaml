# Render Blueprint for the OSAI backend — FREE TIER.
# Only free-eligible service types are used: web service, Postgres, Key Value.
# Qdrant runs on Qdrant Cloud's free tier (create a free cluster at
# https://cloud.qdrant.io and paste its URL + API key below as secrets).
#
# Deploy: Render → New → Blueprint → pick this repo. After it provisions, set
# the `sync: false` secrets in the osai-api service's Environment tab.
#
# Celery worker and Beat are paid Render workers. They are required for durable
# ingestion and recurring automations in production.

databases:
  - name: osai-postgres
    plan: free
    databaseName: osai
    user: osai

services:
  # Redis / Key Value store (free). Used by Celery if you later add a worker.
  - type: keyvalue
    name: osai-redis
    plan: free
    ipAllowList: []

  # FastAPI API (free web service, Docker).
  - type: web
    name: osai-api
    runtime: docker
    dockerfilePath: ./osai-backend/Dockerfile
    dockerContext: ./osai-backend
    healthCheckPath: /health
    plan: free
    envVars:
      # Marks this as a non-local deployment. Activates the production guards:
      # the service refuses to boot without a strong OSAI_JWT_SECRET, and the
      # password-less email login is disabled (Google OAuth is the sign-in path).
      # To re-enable email login for a pilot, set OSAI_EMAIL_LOGIN_ENABLED=true.
      - key: OSAI_ENV
        value: production
      - key: OSAI_DATABASE_URL
        fromDatabase:
          name: osai-postgres
          property: connectionString
      - key: OSAI_REDIS_URL
        fromService:
          type: keyvalue
          name: osai-redis
          property: connectionString
      - key: OSAI_QDRANT_URL          # your Qdrant Cloud cluster URL (https://...)
        sync: false
      - key: OSAI_QDRANT_API_KEY      # your Qdrant Cloud API key
        sync: false
      - key: OSAI_GEMINI_API_KEY      # embeddings
        sync: false
      - key: OSAI_LLM_API_KEY          # Groq (text generation)
        sync: false
      - key: OSAI_LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: OSAI_LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: OSAI_COMPOSIO_API_KEY
        sync: false
      - key: OSAI_ALLOWED_ORIGINS      # your Vercel frontend URL
        sync: false
      # Public URLs — non-secret, safe to commit. Update if domains change.
      - key: OSAI_PUBLIC_BASE_URL      # this API's public URL (Composio auto-ingest callback)
        value: https://osai-api-ema6.onrender.com
      - key: OSAI_FRONTEND_URL         # where to send users after OAuth sign-in
        value: https://osai-five.vercel.app
      # Google sign-in (OAuth 2.0). Redirect URI is non-secret; the client
      # id/secret are set in the dashboard (never committed to git).
      - key: OSAI_GOOGLE_OAUTH_REDIRECT_URI
        value: https://osai-api-ema6.onrender.com/auth/google/callback
      - key: OSAI_GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: OSAI_GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      # Session JWT signing secret — set to a strong random value.
      - key: OSAI_JWT_SECRET
        sync: false
      - key: OSAI_ZOOM_WEBHOOK_SECRET
        sync: false
      # Per-user Hermes reasoning sidecar. Leave UNSET to keep OSAI on its
      # in-house agent (default). Set to the deployed sidecar URL (see
      # services/hermes-sidecar/DEPLOY.md) ONLY after its /run gate passes —
      # then /ask and Automations route through Hermes with in-house fallback.
      - key: OSAI_HERMES_SIDECAR_URL
        sync: false
      # Shared secret with the sidecar — set to the SAME random value as
      # SIDECAR_AUTH_TOKEN on osai-hermes (the sidecar is publicly reachable).
      - key: OSAI_HERMES_SIDECAR_TOKEN
        sync: false

  - type: worker
    name: osai-worker
    runtime: docker
    dockerfilePath: ./osai-backend/Dockerfile
    dockerContext: ./osai-backend
    dockerCommand: celery -A workers.celery_app worker -l info
    plan: starter
    envVars:
      - key: OSAI_ENV
        value: production
      - key: OSAI_DATABASE_URL
        fromDatabase:
          name: osai-postgres
          property: connectionString
      - key: OSAI_REDIS_URL
        fromService:
          type: keyvalue
          name: osai-redis
          property: connectionString
      - key: OSAI_QDRANT_URL
        sync: false
      - key: OSAI_QDRANT_API_KEY
        sync: false
      - key: OSAI_GEMINI_API_KEY
        sync: false
      - key: OSAI_LLM_API_KEY
        sync: false
      - key: OSAI_COMPOSIO_API_KEY
        sync: false
      - key: OSAI_JWT_SECRET
        sync: false
      - key: OSAI_ZOOM_WEBHOOK_SECRET
        sync: false
      - key: OSAI_HERMES_SIDECAR_URL
        sync: false
      - key: OSAI_HERMES_SIDECAR_TOKEN
        sync: false

  - type: worker
    name: osai-beat
    runtime: docker
    dockerfilePath: ./osai-backend/Dockerfile
    dockerContext: ./osai-backend
    dockerCommand: celery -A workers.celery_app beat -l info
    plan: starter
    envVars:
      - key: OSAI_ENV
        value: production
      - key: OSAI_DATABASE_URL
        fromDatabase:
          name: osai-postgres
          property: connectionString
      - key: OSAI_REDIS_URL
        fromService:
          type: keyvalue
          name: osai-redis
          property: connectionString
      - key: OSAI_QDRANT_URL
        sync: false
      - key: OSAI_QDRANT_API_KEY
        sync: false
      - key: OSAI_GEMINI_API_KEY
        sync: false
      - key: OSAI_LLM_API_KEY
        sync: false
      - key: OSAI_COMPOSIO_API_KEY
        sync: false
      - key: OSAI_JWT_SECRET
        sync: false
      - key: OSAI_ZOOM_WEBHOOK_SECRET
        sync: false
      - key: OSAI_HERMES_SIDECAR_URL
        sync: false
      - key: OSAI_HERMES_SIDECAR_TOKEN
        sync: false

  # Hermes reasoning sidecar (per-user hermes-agent behind a tiny HTTP API).
  # ⚠ PAID: Docker build of the hermes CLI needs Starter or above (~$7/mo).
  # Validated locally on Groq (services/hermes-sidecar/DEPLOY.md has the gate).
  # After it deploys: (1) set GROQ_API_KEY in its Environment tab, (2) pass the
  # /run gate in DEPLOY.md step 4, (3) set OSAI_HERMES_SIDECAR_URL on osai-api
  # to this service's URL.
  - type: web
    name: osai-hermes
    runtime: docker
    dockerfilePath: ./services/hermes-sidecar/Dockerfile
    dockerContext: ./services/hermes-sidecar
    healthCheckPath: /health
    plan: starter
    envVars:
      - key: GROQ_API_KEY              # same Groq key as OSAI_LLM_API_KEY
        sync: false
      # Require X-Sidecar-Token on /run — same value as osai-api's
      # OSAI_HERMES_SIDECAR_TOKEN (this service is on the public internet).
      - key: SIDECAR_AUTH_TOKEN
        sync: false
      - key: HERMES_PROVIDER
        value: groq
      - key: HERMES_MODEL
        value: llama-3.3-70b-versatile
      - key: HERMES_BASE_URL           # Groq is OpenAI-compatible; registered as a hermes custom provider
        value: https://api.groq.com/openai/v1
      - key: HERMES_MAX_TOKENS         # Groq rejects hermes' default completion cap
        value: "8192"
      - key: HERMES_TOOLSETS           # keep the tool schema small (Groq 413s on full toolsets)
        value: search
      - key: HERMES_HOME_ROOT
        value: /data/hermes
    disk:
      name: hermes-data                # per-user Hermes memory survives deploys
      mountPath: /data/hermes
      sizeGB: 1
