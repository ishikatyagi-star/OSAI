name: backend-ci

on:
  pull_request:
    paths:
      - "osai-backend/**"
      - "osai-web/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "osai-backend/**"
      - "osai-web/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: osai-backend

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: osai
          POSTGRES_PASSWORD: osai
          POSTGRES_DB: osai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U osai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant:v1.14.1
        ports:
          - 6333:6333
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      OSAI_DATABASE_URL: postgresql+psycopg://osai:osai@localhost:5432/osai
      OSAI_QDRANT_URL: http://localhost:6333
      OSAI_REDIS_URL: redis://localhost:6379/0
      # No LLM/Composio keys in CI — live-key tests skip; the rest run on the
      # hash-embedding fallback against the seeded data.

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Migrate + seed
        run: |
          uv run alembic upgrade head
          uv run python -m db.seed

      - name: Test
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: osai-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: osai-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
