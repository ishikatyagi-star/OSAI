name: backend-ci

on:
  pull_request:
    paths:
      - "osai-backend/**"
      - "services/hermes-sidecar/**"
      - "docker-compose.yml"
      - "render.yaml"
      - "scripts/production_canary.py"
      - "scripts/test_deployment_config.py"
      - "scripts/test_production_canary.py"
      - ".github/workflows/production-canary.yml"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "osai-backend/**"
      - "services/hermes-sidecar/**"
      - "docker-compose.yml"
      - "render.yaml"
      - "scripts/production_canary.py"
      - "scripts/test_deployment_config.py"
      - "scripts/test_production_canary.py"
      - ".github/workflows/production-canary.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: osai-backend

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: osai
          POSTGRES_PASSWORD: osai
          POSTGRES_DB: osai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U osai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant:v1.14.1
        ports:
          - 6333:6333
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      OSAI_DATABASE_URL: postgresql+psycopg://osai:osai@localhost:5432/osai
      OSAI_QDRANT_URL: http://localhost:6333
      OSAI_REDIS_URL: redis://localhost:6379/0
      # No LLM/Composio keys in CI — live-key tests skip; the rest run on the
      # hash-embedding fallback against the seeded data.

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Migrate + seed
        run: |
          uv run alembic upgrade head
          uv run python -m db.seed

      - name: Test
        run: uv run pytest

      - name: Validate deployment configuration
        working-directory: .
        run: uv run --project osai-backend python -m unittest scripts.test_deployment_config scripts.test_production_canary

      # Known dependency vulnerabilities are a release gate. Accepted findings
      # must be documented and explicitly ignored by identifier in review.
      - name: Dependency audit (pip-audit)
        run: |
          uv export --no-dev --format requirements-txt > /tmp/requirements.txt
          uvx pip-audit -r /tmp/requirements.txt
