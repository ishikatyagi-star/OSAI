# Golden-path smoke (Playwright, demo mode — no backend needed). Runs nightly
# and on main pushes touching the web app, so a regression that blanks a page
# or breaks login → ask → integrations is caught within a day, not by a pilot
# user. Kept out of PR CI to keep PR feedback fast.
name: e2e-smoke

on:
  schedule:
    - cron: "23 1 * * *"
  push:
    branches: [main]
    paths: ["osai-web/**"]
  workflow_dispatch: {}

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: osai-web
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: osai-web/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: playwright-failure-screenshots
          path: osai-web/output/playwright/test-results/
          retention-days: 7
