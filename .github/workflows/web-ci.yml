name: web-ci

on:
  pull_request:
    paths:
      - "osai-web/**"
      - ".github/workflows/web-ci.yml"
  push:
    branches: [main]
    paths:
      - "osai-web/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: osai-web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: osai-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
