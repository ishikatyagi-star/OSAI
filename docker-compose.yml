services:
  api:
    build:
      context: ./osai-backend
    command: uv run uvicorn api.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./osai-backend:/app
      - /app/.venv
    env_file:
      - ./osai-backend/.env
    environment:
      - OSAI_DATABASE_URL=postgresql+psycopg://osai:osai@postgres:5432/osai
      - OSAI_REDIS_URL=redis://redis:6379/0
      - OSAI_QDRANT_URL=http://qdrant:6333
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - qdrant
  worker:
    build:
      context: ./osai-backend
    # -B runs the beat scheduler in-process (fine for a single worker node);
    # -Q makes the worker consume the routed queues, which it previously
    # didn't — tasks routed to ingest/extract/execute sat unconsumed.
    command: uv run celery -A workers.celery_app worker -B -Q celery,ingest,extract,execute --loglevel=info
    volumes:
      - ./osai-backend:/app
      - /app/.venv
    env_file:
      - ./osai-backend/.env
    environment:
      - OSAI_DATABASE_URL=postgresql+psycopg://osai:osai@postgres:5432/osai
      - OSAI_REDIS_URL=redis://redis:6379/0
      - OSAI_QDRANT_URL=http://qdrant:6333
    depends_on:
      - postgres
      - redis
      - qdrant
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: osai
      POSTGRES_PASSWORD: osai
      POSTGRES_DB: osai
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  qdrant:
    image: qdrant/qdrant:v1.14.1
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage

volumes:
  pgdata:
  qdrantdata:
